name: vision_guide_app

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_text_recognition: ^0.13.0
  speech_to_text: ^7.3.0
  audioplayers: ^6.1.0
  tflite_flutter: ^0.10.4
  cupertino_icons: ^1.0.8
  camera: ^0.10.5
  permission_handler: ^11.3.0
  flutter_vision: ^1.1.4
  flutter_tts: ^4.2.2
  vibration: ^2.0.1
  shared_preferences: ^2.5.4
  flutter_foreground_task: ^8.12.0
  battery_plus: ^6.2.0
  audio_session: ^0.1.21
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/yolov8n_int8.tflite
    - assets/labels.txt
    - assets/midas_v21_small.tflite